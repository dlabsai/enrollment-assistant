<!doctype html>
<html lang="en-US">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
        />
        <link
            rel="icon"
            type="image/svg+xml"
            href="/assets/icons/graduation-cap.svg"
        />
        <title>%VITE_UNIVERSITY_NAME% Enrollment Assistant</title>
        <script type="module">
            if (import.meta.env.DEV) {
                if (!document.title.startsWith("DEV · ")) {
                    document.title = `DEV · ${document.title}`;
                }
                document.querySelector("link[rel='icon']")?.setAttribute("href", "/assets/icons/dev.svg");
            }
            if (import.meta.env.DEV && import.meta.env.VITE_REACT_GRAB === "true") {
                import("react-grab");
            }
        </script>
    </head>
    <body>
        <div style="height: 2000px"></div>
        <div id="chat-root"></div>
        <script
            type="module"
            src="/src/main.tsx"
        ></script>
    </body>
</html>
