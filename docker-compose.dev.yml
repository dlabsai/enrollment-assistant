services:
  backend:
    restart: "no"
    ports:
      - 8000:8000
    build:
      context: ./backend
    # command: sleep infinity  # Infinite loop to keep container alive doing nothing
    command:
      - fastapi
      - run
      - --reload
      - app/main.py
    develop:
      watch:
        - path: ./backend
          action: sync
          target: /app
          ignore:
            - ./backend/.venv
            - .venv
        - path: ./backend/pyproject.toml
          action: rebuild

  frontend:
    restart: "no"
    ports:
      - 8080:80
    build:
      context: ./frontend
      args:
        - BACKEND_HOST=${BACKEND_HOST?Variable not set}

networks:
  promptmanager-network:
    driver: bridge
