name: demo-va

services:
  db:
    image: pgvector/pgvector:pg17
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    env_file:
      - .env
    environment:
      - PGDATA=/var/lib/postgresql/data/pgdata
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD?Variable not set}
      - POSTGRES_USER=${POSTGRES_USER?Variable not set}
      - POSTGRES_DB=${POSTGRES_DB?Variable not set}
    ports:
      - 5432:5432
    volumes:
      - postgres-data:/var/lib/postgresql/data/pgdata

  ensure-test-db:
    image: pgvector/pgvector:pg17
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - PGPASSWORD=${POSTGRES_PASSWORD?Variable not set}
      - POSTGRES_USER=${POSTGRES_USER?Variable not set}
      - POSTGRES_DB=${POSTGRES_DB?Variable not set}
      - PYTEST_POSTGRES_DB=${PYTEST_POSTGRES_DB?Variable not set}
    command:
      - bash
      - -ec
      - |
          if [[ ! "$PYTEST_POSTGRES_DB" =~ _test$ ]]; then
            echo "PYTEST_POSTGRES_DB must end with '_test'"
            exit 1
          fi

          if [[ "$PYTEST_POSTGRES_DB" == "$POSTGRES_DB" ]]; then
            echo "PYTEST_POSTGRES_DB must be different from POSTGRES_DB"
            exit 1
          fi

          psql --host db --username "$POSTGRES_USER" --dbname postgres --set ON_ERROR_STOP=1 \
            --set "test_db=$PYTEST_POSTGRES_DB" <<'SQL'
          SELECT format('CREATE DATABASE %I', :'test_db')
          WHERE NOT EXISTS (
              SELECT 1 FROM pg_database WHERE datname = :'test_db'
          )\gexec
          SQL

  prestart:
    image: ${DOCKER_IMAGE_BACKEND?Variable not set}:${TAG-latest}
    build:
      context: ./backend
    depends_on:
      db:
        condition: service_healthy
        restart: true
      ensure-test-db:
        condition: service_completed_successfully
    command: bash -ec "python app/backend_pre_start.py && alembic upgrade head"
    env_file:
      - .env
    environment:
      - FRONTEND_HOST=${FRONTEND_HOST?Variable not set}
      - ENVIRONMENT=${ENVIRONMENT}
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS}
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER?Variable not set}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD?Variable not set}

  backend:
    image: ${DOCKER_IMAGE_BACKEND?Variable not set}:${TAG-latest}
    restart: always
    depends_on:
      db:
        condition: service_healthy
        restart: true
      prestart:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      - FRONTEND_HOST=${FRONTEND_HOST?Variable not set}
      - ENVIRONMENT=${ENVIRONMENT}
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS}
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER?Variable not set}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD?Variable not set}
      - SCHEDULER=false
    build:
      context: ./backend
    ports:
      - 8000:8000
    volumes:
      - ./backend/app/chat/templates:/app/app/chat/templates
      - ./backend/app/chat/rag_data:/app/app/chat/rag_data

  scheduler:
    image: ${DOCKER_IMAGE_BACKEND?Variable not set}:${TAG-latest}
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
        restart: true
      prestart:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      - FRONTEND_HOST=${FRONTEND_HOST?Variable not set}
      - ENVIRONMENT=${ENVIRONMENT}
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS}
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER?Variable not set}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD?Variable not set}
      - SCHEDULER=${SCHEDULER:-false}
    build:
      context: ./backend
    command: python -m app.scheduler_runner
    volumes:
      - ./backend/app/chat/templates:/app/app/chat/templates
      - ./backend/app/chat/rag_data:/app/app/chat/rag_data

  frontend-install:
    image: node:20
    restart: "no"
    working_dir: /app
    environment:
      - HOME=/tmp
      - NPM_CONFIG_PREFIX=/tmp/.npm-global
      - CI=true
    command: sh -c "export PATH=/tmp/.npm-global/bin:$${PATH} && npm install -g pnpm@10.28.0 && pnpm install --frozen-lockfile"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
      - frontend-pnpm-store:/app/.pnpm-store

  frontend-public:
    image: node:20
    restart: "no"
    working_dir: /app
    environment:
      - HOME=/tmp
      - NPM_CONFIG_PREFIX=/tmp/.npm-global
      - CI=true
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8000/api}
    command: sh -c "export PATH=/tmp/.npm-global/bin:$${PATH} && npm install -g pnpm@10.28.0 && pnpm --filter @va/app-public dev-local"
    depends_on:
      backend:
        condition: service_started
      frontend-install:
        condition: service_completed_successfully
    ports:
      - 5173:5173
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules

  frontend-internal:
    image: node:20
    restart: "no"
    working_dir: /app
    environment:
      - HOME=/tmp
      - NPM_CONFIG_PREFIX=/tmp/.npm-global
      - CI=true
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8000/api}
    command: sh -c "export PATH=/tmp/.npm-global/bin:$${PATH} && npm install -g pnpm@10.28.0 && pnpm --filter @va/app-internal dev-local"
    depends_on:
      backend:
        condition: service_started
      frontend-install:
        condition: service_completed_successfully
    ports:
      - 5174:5174
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules

volumes:
  postgres-data:
    name: demo-va-postgres-data
  frontend-node-modules:
    name: demo-va-frontend-node-modules
  frontend-pnpm-store:
    name: demo-va-frontend-pnpm-store
